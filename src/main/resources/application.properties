spring.application.name=Vacunar-te
server.port=8000

# color en la consola
spring.output.ansi.enabled=always

# Configuracion de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
#vacunarte_db
spring.datasource.username=${DB_USER}
#root
spring.datasource.password=${DB_PASSWORD}
#tu_contrase?a
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostrar las consultas SQL en la consola (Muy util para la Etapa 2)
spring.jpa.show-sql=true

# Suprimir error patron Open Session in View (OSIV)
spring.jpa.open-in-view=false

# Pruebas del Sistema
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create