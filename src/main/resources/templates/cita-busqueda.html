<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Turno - Vacunar-te</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Solicitud de Turno</h3>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Ingrese su DNI para verificar su estado en el plan de vacunación.</p>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/citas/validar}" method="post">
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">DNI del Ciudadano:</label>
                            <input type="number" name="dni" class="form-control form-control-lg" placeholder="Ej: 35123456" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Verificar Disponibilidad</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/ciudadanos/nuevo}" class="text-decoration-none">¿No está registrado? Inscríbase aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
