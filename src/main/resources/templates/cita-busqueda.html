<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Turno - Vacunar-te</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-search { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header {
            border-radius: 20px 20px 0 0 !important;
            background: linear-gradient(135deg, #0d6efd, #004fb1);
            padding: 1.5rem;
        }
        .btn-primary { border-radius: 10px; padding: 12px; font-weight: 600; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); }
        .form-control-lg { border-radius: 10px; border: 2px solid #e9ecef; }
        .form-control-lg:focus { border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="text-center mb-4">
                <div class="bg-white d-inline-block p-3 rounded-circle shadow-sm mb-3">
                    <i class="bi bi-person-badge-fill text-primary fs-1"></i>
                </div>
                <h2 class="fw-bold text-dark">Vacunar-te</h2>
                <p class="text-muted small">Sistema de Gestion de Turnos - Cordoba</p>
            </div>

            <div class="card card-search bg-white">
                <div class="card-header text-white text-center">
                    <h4 class="mb-0 fw-bold">Solicitud de Turno</h4>
                </div>

                <div class="card-body p-4 p-md-5">
                    <p class="small text-secondary mb-4 text-center">
                        Ingrese su documento para verificar su estado en el plan de vacunacion provincial.
                    </p>

                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4 border-0 shadow-sm" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div th:text="${error}"></div>
                        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/citas/validar}" method="post">
                        <div class="mb-4">
                            <label for="dniInput" class="form-label fw-bold text-dark">
                                <i class="bi bi-hash me-1 text-primary"></i> DNI del Ciudadano
                            </label>

                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person-vcard text-muted"></i>
                                </span>
                                <input type="number"
                                       id="dniInput"
                                       name="dni"
                                       class="form-control form-control-lg border-start-0"
                                       placeholder="Sin puntos ni espacios"
                                       required
                                       autofocus>
                            </div>
                            <div class="form-text mt-2 extra-small text-muted">
                                * Debe estar registrado previamente en el sistema.
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                <i class="bi bi-search me-2"></i> Verificar Disponibilidad
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-footer bg-light border-0 text-center py-3">
                    <a th:href="@{/ciudadanos/nuevo}" class="text-decoration-none fw-bold small">
                        <i class="bi bi-pencil-square me-1"></i> ¿No esta registrado? Inscribase aqui
                    </a>
                </div>
            </div>

            <p class="text-center mt-5 text-muted small" style="font-size: 0.75rem;">
                Ministerio de Salud - Provincia de Cordoba &copy; 2026
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
