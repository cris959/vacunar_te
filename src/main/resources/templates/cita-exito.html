<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turno Confirmado - Vacunar-te</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .success-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .success-header {
            background: linear-gradient(135deg, #198754, #146c43);
            padding: 2.5rem;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .btn-home { border-radius: 10px; padding: 12px 30px; font-weight: 600; }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">

            <div class="success-card bg-white">
                <div class="success-header text-white">
                    <div class="icon-circle mb-3">
                        <i class="bi bi-check-lg fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-0">¡Turno Confirmado!</h2>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div class="mb-4">
                        <p class="text-muted small text-uppercase fw-bold mb-2">Detalle de la Citacion</p>
                        <h4 class="text-dark mb-3" th:text="${mensaje}"></h4>

                        <div class="p-3 bg-light rounded-3 text-start border-start border-4 border-success">
                            <p class="mb-1 small"><strong>DNI:</strong> <span th:text="${dni}"></span></p>
                            <p class="mb-0 small"><strong>Centro:</strong> <span th:text="${centro}"></span></p>
                        </div>
                    </div>

                    <div class="alert alert-warning border-0 small mb-4">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Por favor, asista al centro con su DNI fisico y carnet de vacunacion previo si posee.
                    </div>

                    <div class="d-grid">
                        <a th:href="@{/citas/solicitar}" class="btn btn-success btn-home shadow-sm">
                            <i class="bi bi-house-door me-2"></i> Finalizar y Volver al Inicio
                        </a>
                    </div>
                </div>
            </div>

            <p class="mt-4 text-muted small">
                © 2026 Ministerio de Salud - Villa Dolores, Cordoba
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
