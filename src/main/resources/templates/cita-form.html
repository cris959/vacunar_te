<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Turno - Vacunar-te</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm" role="alert">
                <i class="bi bi-exclamation-octagon-fill me-2"></i>
                <span th:text="${error}">Error al procesar el turno</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow border-success">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0 text-center"><i class="bi bi-check-circle-fill"></i> Ciudadano Habilitado</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/citas/guardar}" method="post">
                        <input type="hidden" name="dni" th:value="${dni}">

                        <div class="alert alert-info border-0 shadow-sm d-flex align-items-center">
                            <i class="bi bi-person-badge fs-4 me-3"></i>
                            <div>
                                <small class="d-block text-uppercase fw-bold opacity-75">DNI Detectado</small>
                                <strong class="fs-5" th:text="${dni}"></strong>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Centro de Vacunación:</label>
                            <select name="centro" class="form-select form-select-lg border-success" required>
                                <option value="" disabled selected>Seleccione el centro más cercano...</option>
                                <option th:each="c : ${centros}"
                                        th:value="${c}"
                                        th:text="${c}"></option>
                            </select>
                            <div class="form-text mt-2 text-muted">
                                * Se le asignará un turno automáticamente para las próximas 24-48 horas.
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm">
                                <i class="bi bi-calendar-check me-2"></i>Confirmar Mi Turno
                            </button>
                            <a th:href="@{/ciudadanos/listado}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">
                Provincia de Córdoba - Ministerio de Salud
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
