<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programar Turno - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .form-card {
            max-width: 650px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header-green {
            background: linear-gradient(135deg, #198754, #146c43);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .btn-confirm {
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-confirm:hover { background-color: #146c43; transform: translateY(-1px); color: white; }
        .input-group-text { background-color: #f8f9fa; border-right: none; }
        .form-select, .form-control { border-left: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-card">
        <div class="card-header card-header-green">
            <i class="bi bi-calendar2-check fs-1 mb-2"></i>
            <h3 class="mb-0">Programar Nueva Cita</h3>
            <p class="opacity-75 mb-0 small">Villa Dolores - Gestión de Vacunación</p>
        </div>

        <div class="card-body p-5">
            <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div th:text="${error}">Error al procesar la cita</div>
            </div>

            <form th:action="@{/citas/guardar}" method="post">

                <div class="mb-4">
                    <label for="dni" class="form-label">DNI del Ciudadano</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <select id="dni" name="dni" class="form-select" required>
                            <option value="" disabled selected>Seleccione al ciudadano...</option>
                            <option th:each="c : ${ciudadanos}"
                                    th:value="${c.dni}"
                                    th:text="${c.dni + ' - ' + c.nombreCompleto}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="centro" class="form-label">Centro de Vacunación</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                        <select id="centro" name="centro" class="form-select" required>
                            <option value="" disabled selected>Seleccione el lugar...</option>
                            <option th:each="cen : ${centros}"
                                    th:value="${cen}"
                                    th:text="${cen}"></option>
                        </select>
                    </div>
                </div>

                <div class="alert alert-info border-0 small mb-4 py-3">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    La fecha se asignará automáticamente para el día de mañana según disponibilidad.
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-confirm shadow-sm">
                        <i class="bi bi-check-circle me-2"></i> Confirmar Turno
                    </button>
                    <a th:href="@{/ciudadanos/listado}" class="btn btn-link text-secondary text-decoration-none mt-2">
                        <i class="bi bi-arrow-left"></i> Volver al listado
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
