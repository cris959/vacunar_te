<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ciudadano - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .form-card { max-width: 800px; margin: 40px auto; border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background-color: #0d6efd; color: white; padding: 25px; }
        .bg-readonly { background-color: #e9ecef !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-card">
        <div class="card-header d-flex align-items-center">
            <i class="bi bi-person-vcard fs-2 me-3"></i>
            <h3 class="mb-0" th:text="${editando} ? 'Modificar Ciudadano' : 'Nuevo Registro'">Nuevo Registro</h3>
        </div>

        <div class="card-body p-5">
            <form th:action="${editando} ? @{/ciudadanos/actualizar} : @{/ciudadanos/guardar}" th:object="${ciudadano}" method="post">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="dni" class="form-label fw-bold">DNI</label>
                        <input type="number" th:field="*{dni}" id="dni" class="form-control"
                               th:readonly="${editando}" th:classappend="${editando} ? 'bg-readonly' : ''" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="nombreCompleto" class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" th:field="*{nombreCompleto}" id="nombreCompleto" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="celular" class="form-label fw-bold">Número de Celular</label>
                        <input type="text" th:field="*{celular}" id="celular" class="form-control" placeholder="3544..." required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" th:field="*{email}" id="email" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="ambitoTrabajo" class="form-label fw-bold">Ámbito Laboral</label>
                        <select th:field="*{ambitoTrabajo}" id="ambitoTrabajo" class="form-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option th:each="a : ${ambitos}" th:value="${a}" th:text="${a}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="patologia" class="form-label fw-bold">Patología / Condición</label>
                        <input type="text" th:field="*{patologia}" id="patologia" class="form-control">
                    </div>
                </div>

                <input type="hidden" th:field="*{activo}" />

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a th:href="@{/ciudadanos/listado}" class="text-secondary text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary px-5 py-2">
                        <i class="bi bi-check-circle me-2"></i> Confirmar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
