<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro de Ciudadano</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Inscripción al Plan de Vacunación</h2>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/ciudadanos/guardar}" th:object="${ciudadano}" method="post" class="card p-4 shadow">
    <div class="mb-3">
        <label class="form-label">DNI:</label>
        <input type="number" th:field="*{dni}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Nombre Completo:</label>
        <input type="text" th:field="*{nombreCompleto}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Ámbito de Trabajo:</label>
        <select th:field="*{ambitoTrabajo}" class="form-select">
            <option th:each="ambito : ${ambitos}"
                    th:value="${ambito}"
                    th:text="${#strings.capitalize(#strings.toLowerCase(ambito))}"></option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Registrar</button>
</form>
</body>
</html>
