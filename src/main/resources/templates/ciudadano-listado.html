<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudadanos Registrados - Vacun-arTe</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .table-card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            background: white;
        }

        .dni-link {
            font-weight: 600;
            color: #0d6efd;
            text-decoration: none;
        }

        .badge-ambito {
            background-color: #e2f4f1;
            color: #0f5132;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
        }

        .btn-action {
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.9rem;
        }

        .btn-gestionar {
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-gestionar:hover {
            background-color: #157347;
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }
    </style>
</head>
<body>
<div class="container py-5">

    <div th:replace="~{fragments/navbar :: menu-superior}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-dark"><i class="bi bi-people-fill text-primary me-2"></i> Ciudadanos Registrados
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/ciudadanos/nuevo}" class="btn btn-primary px-4 shadow-sm" style="border-radius: 10px;">
                <i class="bi bi-person-plus-fill me-2"></i> Nuevo Registro
            </a>

            <a th:href="@{/ciudadanos/papelera}" sec:authorize="hasRole('ADMIN')"
               class="btn btn-outline-danger shadow-sm" style="border-radius: 10px;">
                <i class="bi bi-trash3-fill me-2"></i> Ver Papelera de Bajas
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 12px;">
        <form th:action="@{/ciudadanos/listado}" method="get" class="row g-3 align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscarDni" name="buscarDni" class="form-control border-start-0"
                           placeholder="Buscar por número de DNI..." th:value="${param.buscarDni}">
                </div>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-dark px-4" style="border-radius: 8px;">Buscar</button>
                <a th:href="@{/ciudadanos/listado}" class="btn btn-outline-secondary px-3" style="border-radius: 8px;">
                    <i class="bi bi-arrow-clockwise"></i>
                </a>
            </div>
        </form>
    </div>

    <div class="card table-card mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">DNI</th>
                        <th>Nombre Completo</th>
                        <th>Email / Contacto</th>
                        <th>Ámbito</th>
                        <th>Patología</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${ciudadanos}">
                        <td class="ps-4">
                            <span sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/ciudadanos/editar/{id}(id=${c.dni})}" class="dni-link"
                                   th:text="${c.dni}"></a>
                            </span>
                            <span sec:authorize="!hasRole('ADMIN')" th:text="${c.dni}" class="fw-bold"></span>
                        </td>
                        <td th:text="${c.nombreCompleto}" class="fw-medium text-dark"></td>
                        <td>
                            <div th:text="${c.email}"></div>
                            <small class="text-muted" th:text="${c.celular}"></small>
                        </td>
                        <td><span class="badge badge-ambito" th:text="${c.ambitoTrabajo}"></span></td>
                        <td th:text="${c.patologia ?: 'Ninguna'}" class="text-muted"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/citas/nuevo/{id}(id=${c.dni})}"
                                   class="btn btn-outline-success btn-sm btn-action" title="Asignar Turno">
                                    <i class="bi bi-calendar-plus me-1"></i> Turno
                                </a>

                                <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                                    <a th:href="@{/ciudadanos/editar/{id}(id=${c.dni})}"
                                       class="btn btn-outline-primary btn-sm btn-action" title="Editar">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <a th:href="@{/ciudadanos/eliminar/{id}(id=${c.dni})}"
                                       class="btn btn-outline-danger btn-sm btn-action"
                                       onclick="return confirm('¿Enviar a papelera?')">
                                        <i class="bi bi-person-x"></i>
                                    </a>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center gap-3 my-5">
        <a th:href="@{/citas/nuevo}" class="btn btn-gestionar shadow-lg px-4 py-3">
            <i class="bi bi-calendar-check-fill me-2"></i> Gestionar Nueva Cita
        </a>

        <a th:href="@{/laboratorios/listado}" sec:authorize="hasRole('ADMIN')"
           class="btn btn-gestionar shadow-lg px-4 py-3">
            <i class="bi bi-building-fill-check me-2"></i> Gestionar Laboratorios
        </a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
