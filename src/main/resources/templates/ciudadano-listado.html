<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Ciudadanos - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .table thead { background-color: #212529; color: white; }
        .card-list { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .badge-ambito { background-color: #e0f7fa; color: #006064; border: 1px solid #b2ebf2; }
        .btn-action { border-radius: 8px; transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark mb-0">
            <i class="bi bi-people-fill text-primary me-2"></i> Ciudadanos Registrados
        </h2>
        <a th:href="@{/ciudadanos/nuevo}" class="btn btn-primary px-4 shadow-sm fw-bold">
            <i class="bi bi-person-plus-fill me-2"></i> Nuevo Registro
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3 mb-4 align-items-center">
        <div class="col-md-7">
            <form th:action="@{/ciudadanos/listado}" method="get" class="d-flex gap-2">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" name="buscarDni" class="form-control border-start-0"
                           placeholder="Buscar por numero de DNI..." aria-label="Buscar">
                    <button class="btn btn-dark px-4" type="submit">Buscar</button>
                </div>
                <a th:href="@{/ciudadanos/listado}" class="btn btn-outline-secondary shadow-sm" title="Refrescar">
                    <i class="bi bi-arrow-clockwise"></i>
                </a>
            </form>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/ciudadanos/papelera}" class="btn btn-outline-danger shadow-sm fw-medium">
                <i class="bi bi-trash3-fill me-2"></i> Ver Papelera de Bajas
            </a>
        </div>
    </div>

    <div class="card card-list">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">DNI</th>
                    <th>Nombre Completo</th>
                    <th>Email / Contacto</th>
                    <th>Ambito</th>
                    <th>Patologia</th>
                    <th class="text-center pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${ciudadanos}">
                    <td class="ps-4 fw-bold text-primary" th:text="${c.dni}"></td>
                    <td th:text="${c.nombreCompleto}"></td>
                    <td>
                        <div class="small" th:text="${c.email}"></div>
                        <div class="text-muted extra-small" style="font-size: 0.75rem;" th:text="${c.celular}"></div>
                    </td>
                    <td>
                            <span class="badge badge-ambito px-3 py-2"
                                  th:text="${#strings.capitalize(#strings.toLowerCase(c.ambitoTrabajo))}"></span>
                    </td>
                    <td class="small text-muted" style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <span th:text="${c.patologia != null && !c.patologia.isEmpty() ? c.patologia : 'Ninguna'}"></span>
                    </td>
                    <td class="text-center pe-4">
                        <div class="btn-group gap-2">
                            <a th:href="@{/citas/validar(dni=${c.dni})}" class="btn btn-sm btn-outline-success btn-action" title="Asignar Turno">
                                <i class="bi bi-calendar-plus"></i> Turno
                            </a>
                            <a th:href="@{/ciudadanos/eliminar/{dni}(dni=${c.dni})}"
                               class="btn btn-sm btn-outline-danger btn-action"
                               onclick="return confirm('¿Desea dar de baja a este ciudadano? Podra restaurarlo desde la papelera.')"
                               title="Dar de Baja">
                                <i class="bi bi-person-x"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(ciudadanos)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                        No se encontraron ciudadanos registrados en la base de datos.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 d-flex justify-content-between align-items-center">
        <a th:href="@{/citas/solicitar}" class="btn btn-dark btn-lg px-4 shadow-sm">
            <i class="bi bi-calendar-check-fill me-2"></i> Gestionar Nueva Cita
        </a>
        <div class="text-muted small">
            <i class="bi bi-geo-alt-fill text-danger me-1"></i> Villa Dolores, Provincia de Cordoba
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
