<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ciudadanos - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people-fill text-primary"></i> Ciudadanos Registrados</h2>
        <a th:href="@{/ciudadanos/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Nuevo Registro
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <form th:action="@{/ciudadanos/listado}" method="get" class="d-flex">
                <input type="text" name="buscarDni" class="form-control me-2"
                       placeholder="Buscar por DNI..." aria-label="Buscar">
                <button class="btn btn-outline-primary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/ciudadanos/listado}" class="btn btn-outline-secondary ms-2">
                    <i class="bi bi-arrow-clockwise"></i>
                </a>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <div class="table-responsive">
                <div class="col-md-6 d-flex justify-content-end align-items-center">
                    <a th:href="@{/ciudadanos/papelera}" class="btn btn-outline-danger shadow-sm">
                        <i class="bi bi-trash3"></i> Ver Papelera
                    </a>
                </div>
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>DNI</th>
                        <th>Nombre Completo</th>
                        <th>Email</th>
                        <th>Celular</th>
                        <th>Ámbito</th>
                        <th>Patología</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${ciudadanos}">
                        <td th:text="${c.dni}" class="fw-bold"></td>
                        <td th:text="${c.nombreCompleto}"></td>
                        <td th:text="${c.email}"></td>
                        <td th:text="${c.celular}"></td>
                        <td>
                            <span class="badge bg-info text-dark"
                                  th:text="${#strings.capitalize(#strings.toLowerCase(c.ambitoTrabajo))}"></span>
                        </td>
                        <td>
                            <small th:text="${c.patologia != null && !c.patologia.isEmpty() ? c.patologia : 'Ninguna'}"
                                   class="text-muted"></small>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/citas/validar(dni=${c.dni})}" class="btn btn-sm btn-outline-primary" title="Nuevo Turno">
                                <i class="bi bi-calendar-plus"></i>
                            </a>

                            <a th:href="@{/ciudadanos/eliminar/{dni}(dni=${c.dni})}"
                               class="btn btn-sm btn-outline-danger ms-1"
                               onclick="return confirm('¿Desea dar de baja a este ciudadano? Podrá restaurarlo desde la papelera.');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ciudadanos)}">
                        <td colspan="7" class="text-center py-4">No hay ciudadanos registrados todavía.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-4 d-flex justify-content-between align-items-center">
        <a th:href="@{/citas/solicitar}" class="btn btn-primary btn-lg shadow-sm">
            <i class="bi bi-calendar-check-fill me-2"></i> Nueva Solicitud de Turno
        </a>

        <span class="text-muted small">
        <i class="bi bi-info-circle"></i> Sistema de Gestión Vacunar-te 2026
    </span>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
