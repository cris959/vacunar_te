<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Sistema - Vacunar-te</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #fdfdfe; font-family: 'Segoe UI', sans-serif; }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { border: none; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        .icon-box { font-size: 5rem; color: #ffc107; }
        .btn-home { border-radius: 10px; padding: 12px 25px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container error-container">
    <div class="card error-card p-4 p-md-5 text-center bg-white">

        <div class="icon-box mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <h2 class="fw-bold text-dark mb-3">Ups, algo salio mal</h2>
        <p class="text-muted mb-4">
            El sistema encontro una dificultad inesperada al procesar su solicitud. Por favor, intente nuevamente en unos instantes.
        </p>

        <div th:if="${error}" class="p-3 bg-light rounded-3 mb-4 border-start border-4 border-warning text-start">
            <small class="text-uppercase fw-bold text-muted d-block mb-1" style="font-size: 0.7rem;">Detalle del error:</small>
            <code class="text-break" th:text="${error}">Error desconocido</code>
        </div>

        <div class="d-grid gap-2">
            <a th:href="@{/citas/solicitar}" class="btn btn-dark btn-home shadow-sm">
                <i class="bi bi-house-door me-2"></i> Volver al Inicio
            </a>
            <button onclick="window.location.reload();" class="btn btn-outline-secondary btn-home border-0">
                <i class="bi bi-arrow-clockwise me-2"></i> Reintentar operacion
            </button>
        </div>

        <p class="mt-5 text-muted extra-small" style="font-size: 0.75rem;">
            Codigo de Error: 500 | Vacunar-te Cordoba 2026
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
