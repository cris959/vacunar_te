<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<nav th:fragment="menu-superior" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-warning fw-semibold px-3" th:href="@{/ciudadanos/listado}">Ciudadanos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-warning fw-semibold px-3" th:href="@{/vacunas/listado}">Vacunas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-semibold px-3"
                       th:href="@{/laboratorios/listado}">Laboratorios</a>
                </li>
            </ul>

            <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                <div class="text-light me-3 small">
                    <i class="bi bi-person-circle text-info me-1"></i>
                    Usuario: <span class="fw-bold text-info" sec:authentication="name">user</span>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-danger btn-sm px-3 fw-bold">Salir</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
