<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${laboratorio.idLaboratorio == 0 ? 'Nuevo Laboratorio' : 'Editar Laboratorio'}">Gestion de Laboratorios - Vacunar-te</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .form-card { max-width: 750px; margin: 40px auto; border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .card-header-green { background: linear-gradient(135deg, #198754, #146c43); color: white; padding: 2rem; border-radius: 20px 20px 0 0; text-align: center; }
        .form-label { font-weight: 600; color: #495057; }
        .btn-save { background-color: #198754; color: white; border-radius: 10px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-card">
        <div class="card-header card-header-green">
            <i class="bi bi-building-add fs-1"></i>
            <h3 class="mb-0" th:text="${laboratorio.idLaboratorio == 0 ? 'Registrar Laboratorio' : 'Modificar Laboratorio'}"></h3>
        </div>

        <div class="card-body p-5">
            <form th:action="@{/laboratorios/guardar}" th:object="${laboratorio}" method="post">

                <input type="hidden" th:field="*{idLaboratorio}">
                <input type="hidden" th:field="*{activo}">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="cuit" class="form-label">CUIT (11 dígitos)</label>
                        <input type="text" id="cuit" th:field="*{cuit}" class="form-control" placeholder="30123456789" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="nomComercial" class="form-label">Nombre Comercial</label>
                        <select id="nomComercial" th:field="*{nomComercial}" class="form-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Pfizer-BioNTech">Pfizer-BioNTech</option>
                            <option value="Moderna">Moderna</option>
                            <option value="AstraZeneca">AstraZeneca</option>
                            <option value="Sputnik V">Sputnik V</option>
                            <option value="Sinopharm">Sinopharm</option>
                            <option value="Laboratorios Richmond">Laboratorios Richmond</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="pais" class="form-label">País de Origen</label>
                        <select id="pais" th:field="*{pais}" class="form-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Argentina">Argentina</option>
                            <option value="EE.UU.">EE.UU.</option>
                            <option value="Reino Unido">Reino Unido</option>
                            <option value="China">China</option>
                            <option value="Rusia">Rusia</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="domComercial" class="form-label">Domicilio Comercial</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                            <input type="text" id="domComercial" th:field="*{domComercial}" class="form-control"
                                   placeholder="Av. Libertador 7208, CABA">
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-3">
                    <button type="submit" class="btn btn-save shadow-sm">
                        <i class="bi bi-cloud-arrow-up-fill me-2"></i> Guardar Cambios
                    </button>
                    <a th:href="@{/laboratorios/listado}" class="btn btn-link text-secondary text-decoration-none text-center">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Auto-completado de Pais segun Laboratorio
    document.getElementById('nomComercial').addEventListener('change', function() {
        const paisSelect = document.getElementById('pais');
        const mapa = {
            'Pfizer-BioNTech': 'EE.UU.',
            'Moderna': 'EE.UU.',
            'AstraZeneca': 'Reino Unido',
            'Sputnik V': 'Rusia',
            'Sinopharm': 'China',
            'Laboratorios Richmond': 'Argentina'
        };
        if (mapa[this.value]) {
            paisSelect.value = mapa[this.value];
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
