<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Laboratorios - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-building"></i> Listado de Laboratorios</h2>
        <a th:href="@{/laboratorios/nuevo}" class="btn btn-success">Nuevo Laboratorio</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>CUIT</th>
            <th>Nombre</th>
            <th>Pais</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="lab : ${laboratorios}">
            <td th:text="${lab.cuit}"></td>
            <td th:text="${lab.nomComercial}"></td>
            <td th:text="${lab.pais}"></td>
            <td>
                <a th:href="@{/laboratorios/editar/{id}(id=${lab.idLaboratorio})}" class="btn btn-sm btn-primary">Editar</a>
                <a th:href="@{/laboratorios/eliminar/{id}(id=${lab.idLaboratorio})}" class="btn btn-sm btn-danger">Baja</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
