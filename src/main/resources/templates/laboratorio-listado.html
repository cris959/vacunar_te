<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Laboratorios - Vacun-arTe</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .table-card { border-radius: 15px; border: 1px solid #eee; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: white; }
        .btn-gestionar { background-color: #198754; color: white; border: none; border-radius: 12px; font-weight: 500; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-gestionar:hover { background-color: #157347; transform: translateY(-2px); color: white; box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3); }
        /* Clases para los colores de países según tu captura */
        .bg-eeuu { background-color: #e2f4f1; color: #0f5132; }
        .bg-argentina { background-color: #eef2ff; color: #4338ca; }
        .bg-china { background-color: #fff9db; color: #856404; }
        .bg-reino-unido { background-color: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-dark">
            <i class="bi bi-building text-primary me-2"></i> Listado de Laboratorios
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/laboratorios/nuevo}" class="btn btn-success px-3 shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-plus-lg me-1"></i> Nuevo Laboratorio
            </a>
            <a th:href="@{/laboratorios/papelera}" class="btn btn-outline-danger px-3 shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-trash3 me-1"></i> Ver Papelera de Bajas
            </a>
        </div>
    </div>

    <div class="card table-card mb-4">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="text-muted small text-uppercase">
                    <tr>
                        <th>Cuit</th>
                        <th>Nombre</th>
                        <th>País</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${laboratorios}">
                        <td th:text="${l.cuit}" class="text-primary fw-medium"></td>
                        <td th:text="${l.nomComercial}" class="fw-bold text-dark"></td>
                        <td>
                            <span class="badge rounded-pill px-3 py-2 border-0"
                                  th:text="${l.pais}"
                                  th:classappend="${l.pais == 'EE.UU.' || l.pais == 'EEUU' ? 'bg-eeuu' :
                                                 (l.pais == 'Argentina' ? 'bg-argentina' :
                                                 (l.pais == 'China' ? 'bg-china' : 'bg-reino-unido'))}">
                            </span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/laboratorios/editar/{id}(id=${l.idLaboratorio})}" class="btn btn-outline-primary btn-sm rounded-3 me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/laboratorios/eliminar/{id}(id=${l.idLaboratorio})}" class="btn btn-outline-danger btn-sm rounded-3">
                                <i class="bi bi-building-x"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center my-5">
        <a th:href="@{/vacunas/nuevo}" class="btn btn-gestionar shadow-lg px-5 py-3">
            <i class="bi bi-box-seam-fill me-2"></i> Registrar Nuevo Lote de Vacunas
        </a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
