<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Laboratorios - Vacun-arTe</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .table-card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: white; overflow: hidden; }
        .btn-gestionar { background-color: #198754; color: white; border: none; border-radius: 12px; font-weight: 500; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-gestionar:hover { background-color: #157347; transform: translateY(-2px); color: white; box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3); }

        /* Badges de países */
        .badge-pais { padding: 6px 12px; border-radius: 8px; font-weight: 500; border: none; }
        .bg-eeuu { background-color: #e2f4f1; color: #0f5132; }
        .bg-argentina { background-color: #eef2ff; color: #4338ca; }
        .bg-china { background-color: #fff9db; color: #856404; }
        .bg-default { background-color: #f1f3f5; color: #495057; }
    </style>
</head>
<body>

<!--<div th:replace="~{fragments/navbar :: menu-superior}"></div>-->

<div class="container py-5">

    <div th:replace="~{fragments/navbar :: menu-superior}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-dark">
            <i class="bi bi-building text-primary me-2"></i> Listado de Laboratorios
        </h2>
        <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/laboratorios/nuevo}" class="btn btn-success px-3 shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-plus-lg me-1"></i> Nuevo Laboratorio
            </a>
            <a th:href="@{/laboratorios/papelera}" class="btn btn-outline-danger px-3 shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-trash3 me-1"></i> Papelera
            </a>
        </div>
    </div>

    <div class="card table-card mb-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr class="small text-uppercase text-muted">
                    <th class="ps-4">CUIT (Sin guiones)</th>
                    <th>Nombre Comercial</th>
                    <th>País</th>
                    <th class="text-end pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l : ${laboratorios}">
                    <td class="ps-4 text-primary fw-medium" th:text="${l.cuit}"></td>
                    <td class="fw-bold text-dark" th:text="${l.nomComercial}"></td>
                    <td>
                            <span class="badge badge-pais"
                                  th:text="${l.pais}"
                                  th:classappend="${l.pais == 'Argentina' ? 'bg-argentina' :
                                                 (l.pais == 'China' ? 'bg-china' :
                                                 (l.pais == 'EE.UU.' || l.pais == 'EEUU' ? 'bg-eeuu' : 'bg-default'))}">
                            </span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="d-flex justify-content-end gap-2" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/laboratorios/editar/{id}(id=${l.idLaboratorio})}"
                               class="btn btn-outline-primary btn-sm rounded-3">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <form th:action="@{/laboratorios/eliminar/{id}(id=${l.idLaboratorio})}" method="post"
                                  onsubmit="return confirm('¿Confirma la baja de este laboratorio?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-3">
                                    <i class="bi bi-building-x"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center my-5">
        <a th:href="@{/vacunas/nuevo}" class="btn btn-gestionar shadow-lg px-5 py-3">
            <i class="bi bi-box-seam-fill me-2"></i> Registrar Nuevo Lote de Vacunas
        </a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
