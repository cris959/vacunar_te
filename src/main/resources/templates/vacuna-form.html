
    <!DOCTYPE html>
    <html xmlns:th="https://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vacunar-te | Registro de Lotes</title>
        <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

        <style>
            body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
            .form-card { max-width: 800px; margin: 50px auto; border: none; border-radius: 10px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
            .card-header { background-color: #0d6efd; color: white; border-radius: 10px 10px 0 0 !important; padding: 25px; }
            .form-label { color: #0d6efd; font-weight: 600; }
            .btn-register { background-color: #0d6efd; border: none; padding: 12px; font-size: 1.1rem; border-radius: 8px; }
            .btn-register:hover { background-color: #0b5ed7; }
            .back-link { color: #6c757d; text-decoration: none; font-size: 0.9rem; }
        </style>
    </head>
    <body>

    <div class="container">
        <div class="card form-card">
            <div class="card-header">
                <h3 class="mb-0"><i class="bi bi-box-seam me-2"></i> Ingreso de Lotes y Vacunas</h3>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/vacunas/guardar}" th:object="${vacuna}" method="post">
                    <input type="hidden" th:field="*{idVacuna}">

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="antigeno" class="form-label">Tipo de Antígeno</label>
                            <select id="antigeno" th:field="*{antigeno}" class="form-select" required>
                                <option value="" disabled selected>Seleccione...</option>
                                <option th:each="a : ${T(com.cris959.Vacunar_te.model.enums.TipoAntigeno).values()}"
                                        th:value="${a}"
                                        th:text="${#strings.replace(a, '_', ' ')}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="laboratorio" class="form-label">Laboratorio Productor</label>
                            <select id="laboratorio" th:field="*{laboratorio}" class="form-select" required>
                                <option value="" disabled selected>Seleccione...</option>
                                <option th:each="lab : ${laboratorios}"
                                        th:value="${lab.idLaboratorio}"
                                        th:text="${lab.nomComercial}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="nroSerieDosis" class="form-label">Número de Lote</label>
                            <input type="text" id="nroSerieDosis" th:field="*{nroSerieDosis}" class="form-control" placeholder="Ej: LOT-2026-X4" required>
                        </div>
                        <div class="col-md-6">
                            <label for="fechaCaduca" class="form-label">Fecha de Vencimiento</label>
                            <input type="date" id="fechaCaduca" th:field="*{fechaCaduca}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="cantidadDosis" class="form-label">Dosis disponibles (Viales)</label>
                            <input type="number" id="cantidadDosis" th:field="*{cantidadDosis}" class="form-control" placeholder="0" min="1" required>
                        </div>
                        <div class="col-md-6">
                            <label for="medida" class="form-label">Medida de la Dosis (ml)</label>
                            <select id="medida" th:field="*{medida}" class="form-select" required>
                                <option value="" disabled selected>Seleccione medida...</option>
                                <option th:each="m : ${T(com.cris959.Vacunar_te.model.enums.MedidaDosis).values()}"
                                        th:value="${m}"
                                        th:text="${m.valor + ' ml'}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button type="submit" class="btn btn-primary btn-register shadow-sm">
                            <i class="bi bi-box-arrow-in-down me-2"></i> Registrar Stock
                        </button>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/vacunas/listado}" class="back-link">
                            <i class="bi bi-arrow-left"></i> Volver al Inventario
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    </html>
