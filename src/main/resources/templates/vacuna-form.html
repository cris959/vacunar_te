<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Lotes y Vacunas - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .main-container { max-width: 750px; margin-top: 50px; }
        .form-card { border: none; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* Cabecera Azul según Captura 409 */
        .card-header { background-color: #0d6efd; color: white; padding: 20px 30px; border: none; }
        .card-header h3 { font-size: 1.7rem; font-weight: 500; display: flex; align-items: center; margin: 0; }

        .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control, .form-select { padding: 12px; border-radius: 6px; border: 1px solid #dee2e6; }


        .btn-register {
            background-color: #0d6efd;
            border: none;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        .btn-register:hover { background-color: #0b5ed7; }
        .text-primary-label { color: #0d6efd; font-weight: 600; }
        .back-link { text-decoration: none; color: #6c757d; display: block; text-align: center; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="card form-card">
        <div class="card-header">
            <h3>
                <i class="bi bi-box-seam me-3"></i>
                <span th:text="${vacuna.idVacuna != 0 ? 'Editar Lote de Vacuna' : 'Ingreso de Lotes y Vacunas'}">Ingreso de Lotes y Vacunas</span>
            </h3>
        </div>

        <div class="card-body p-5">
            <form th:action="@{/vacunas/guardar}" th:object="${vacuna}" method="post">

                <input type="hidden" th:field="*{idVacuna}" />

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="antigeno" class="form-label">Nombre de la Vacuna</label>
                        <select th:field="*{antigeno}" id="antigeno" class="form-select" required>
                            <option value="" disabled selected>Ej: Sputnik V, Sinopharm</option>
                            <option th:each="a : ${antigenos}" th:value="${a}" th:text="${#strings.replace(a, '_', ' ')}"></option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="laboratorio" class="form-label">Laboratorio Productor</label>
                        <select th:field="*{laboratorio}" id="laboratorio" class="form-select" required>
                            <option value="" disabled selected>Nombre del laboratorio</option>
                            <option th:each="lab : ${laboratorios}" th:value="${lab.idLaboratorio}" th:text="${lab.nomComercial}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="nroSerieDosis" class="form-label">Numero de Lote</label>
                        <input type="text" th:field="*{nroSerieDosis}" id="nroSerieDosis" class="form-control" placeholder="Ej: LOT-2026-X4" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="fechaCaduca" class="form-label">Fecha de Vencimiento</label>
                        <input type="date" th:field="*{fechaCaduca}" id="fechaCaduca" class="form-control" required>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="cantidadDosis" class="form-label text-primary-label">Dosis disponibles en este envase</label>
                    <input type="number" th:field="*{cantidadDosis}" id="cantidadDosis" class="form-control" placeholder="Seleccione la cantidad..." min="0" required>

                    <input type="hidden" th:field="*{medida}" />
                </div>

                <button type="submit" class="btn-register shadow-sm">
                    <i class="bi bi-box-arrow-in-down"></i>
                    <span th:text="${vacuna.idVacuna != 0 ? 'Guardar Cambios del Lote' : 'Registrar Ingreso de Stock'}">Registrar Ingreso de Stock</span>
                </button>
            </form>

            <a th:href="@{/vacunas/listado}" class="back-link">← Volver al Inventario</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
