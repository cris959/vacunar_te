<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Vacunas - Vacunar-te</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .main-container { padding-top: 40px; padding-bottom: 60px; }

        /* Estilos de la tabla y tarjetas */
        .card-stock {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: none;
            overflow: hidden;
        }

        /* Colores de fila segun estado de alerta */
        .tr-vencido { background-color: #fcece9 !important; } /* Rojo tenue */
        .tr-critico { background-color: #fff9db !important; } /* Amarillo tenue */

        .btn-action {
            border-radius: 6px;
            padding: 4px 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            text-decoration: none;
            display: inline-block;
        }
        .btn-edit { color: #0d6efd; }
        .btn-delete { color: #dc3545; }
        .btn-action:hover { background-color: #e2e6ea; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Vacunar-te <span style="color: #6ed3ff;">| Gestion</span></a>
    </div>
</nav>

<div class="container main-container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark mb-0"><i class="bi bi-box me-3"></i>Stock de Vacunas</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/vacunas/depurar}" class="btn btn-outline-warning shadow-sm"
               onclick="return confirm('Desea marcar los lotes caducados como VENCIDOS?')">
                <i class="bi bi-calendar-x me-1"></i> Depurar Vencidos
            </a>
            <a th:href="@{/vacunas/nuevo}" class="btn btn-primary px-4 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Lote
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-alert="alert"></button>
    </div>

    <div class="card-stock">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Laboratorio</th>
                    <th>Antigeno</th>
                    <th class="text-center">Stock</th>
                    <th>Medida</th>
                    <th>Vencimiento</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${vacunas}"
                    th:classappend="${v.fechaCaduca.isBefore(T(java.time.LocalDate).now())} ? 'tr-vencido' : (${v.cantidadDosis <= 10} ? 'tr-critico' : '')">

                    <td class="fw-bold" th:text="${v.idVacuna}"></td>
                    <td th:text="${v.laboratorio.nomComercial}"></td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${v.antigeno}"></span>
                    </td>

                    <td class="text-center">
                        <span th:text="${v.cantidadDosis}" th:classappend="${v.cantidadDosis <= 10} ? 'text-danger fw-bold' : ''"></span>
                        <i th:if="${v.cantidadDosis <= 10}" class="bi bi-exclamation-triangle-fill text-danger ms-1"></i>
                    </td>

                    <td th:text="${v.medida.valor + ' ML'}"></td>
                    <td th:text="${#temporals.format(v.fechaCaduca, 'dd/MM/yyyy')}"></td>

                    <td>
                        <span th:if="${v.fechaCaduca.isBefore(T(java.time.LocalDate).now())}" class="badge bg-danger">VENCIDA</span>
                        <span th:unless="${v.fechaCaduca.isBefore(T(java.time.LocalDate).now())}"
                              class="badge"
                              th:classappend="${v.estado.name() == 'DISPONIBLE' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${v.estado}"></span>
                    </td>

                    <td class="text-center">
                        <div class="btn-group gap-1">
                            <a th:href="@{/vacunas/descontar/{id}(id=${v.idVacuna})}" class="btn-action" title="Aplicar Dosis">
                                <i class="bi bi-dash-circle text-success"></i>
                            </a>
                            <a th:href="@{/vacunas/editar/{id}(id=${v.idVacuna})}" class="btn-action btn-edit" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/vacunas/eliminar/{id}(id=${v.idVacuna})}" class="btn-action btn-delete"
                               onclick="return confirm('Seguro que desea eliminar este lote?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="info-legend p-3 mt-4 bg-white border-start border-5 border-secondary rounded shadow-sm">
        <p class="fw-bold text-dark mb-2"><i class="bi bi-info-circle me-2"></i>Referencia de Stock:</p>
        <div class="d-flex gap-4 small fw-medium">
            <span class="text-danger"><i class="bi bi-circle-fill me-1"></i> Lote Vencido</span>
            <span style="color: #b08900;"><i class="bi bi-square-fill me-1"></i> Stock Critico (&lt;= 10 dosis)</span>
            <span class="text-success"><i class="bi bi-square-fill me-1"></i> Estado Normal</span>
        </div>
    </div>

</div>

<p class="text-center text-muted small mt-2">© 2026 Sistema Vacunar-te - Ministerio de Salud Cordoba</p>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
